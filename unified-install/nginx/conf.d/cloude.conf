upstream cloude_web {
    server cloude_web:8000;
}

upstream cloude_websocket {
    server cloude_daphne:8001;
}

server {
    listen 80;
    server_name ~^(cloude|cloud)\..*$ localhost;

    # Redirect HTTP to HTTPS in production (uncomment for production)
    # return 301 https://$server_name$request_uri;

    # Static files (with caching)
    location /static/ {
        alias /var/www/cloude/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads)
    location /media/ {
        alias /var/www/cloude/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket connections to Daphne
    location /ws/ {
        proxy_pass http://cloude_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Django application backend
    location / {
        proxy_pass http://cloude_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;

        # Pass cookies for authentication
        proxy_set_header Cookie $http_cookie;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

