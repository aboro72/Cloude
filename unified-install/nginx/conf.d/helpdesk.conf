upstream helpdesk_web {
    server helpdesk_web:8000;
}

server {
    listen 80;
    server_name ~^(helpdesk|support)\..*$ localhost;

    # Redirect HTTP to HTTPS in production (uncomment for production)
    # return 301 https://$server_name$request_uri;

    # Static files (with caching)
    location /static/ {
        alias /var/www/helpdesk/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads, attachments)
    location /media/ {
        alias /var/www/helpdesk/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Chat widget endpoint (if on different domain)
    location /chat/ {
        proxy_pass http://helpdesk_web/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django application backend
    location / {
        proxy_pass http://helpdesk_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_redirect off;

        # Pass cookies for authentication
        proxy_set_header Cookie $http_cookie;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

