{% extends "base.html" %}
{% block title %}{{ meeting.title }} – Meeting{% endblock %}
{% block main_class %}p-0 m-0 overflow-hidden{% endblock %}
{% block alerts %}{% endblock %}

{% block extra_css %}
<style>
    body { overflow: hidden; }
    .room-wrap {
        position: fixed;
        top: 60px;
        left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        background: #111;
    }
    .room-header {
        height: 48px;
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.25rem;
        flex-shrink: 0;
        gap: 1rem;
    }
    .room-title {
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .pulse-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #34a853;
        animation: pulse 1.4s infinite;
        flex-shrink: 0;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
    }
    #jitsi-frame {
        flex: 1;
        width: 100%;
        border: none;
    }
    .btn-leave {
        background: #dc3545;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.3rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        transition: background 0.12s;
        flex-shrink: 0;
    }
    .btn-leave:hover { background: #c82333; }
</style>
{% endblock %}

{% block content %}
<div class="room-wrap" id="room-wrap">
    <div class="room-header">
        <span class="room-title">
            <span class="pulse-dot"></span>
            <i class="bi bi-camera-video-fill text-success"></i>
            {{ meeting.title }}
        </span>
        <button class="btn-leave" onclick="leaveAndReturn()">
            <i class="bi bi-telephone-x-fill"></i> Verlassen
        </button>
    </div>
    <div id="jitsi-container" style="flex:1;"></div>
</div>

<script src="https://{{ jitsi_domain }}/external_api.js"></script>
<script>
const RETURN_URL = '{{ return_url|escapejs }}';
const JITSI_DOMAIN = '{{ jitsi_domain|escapejs }}';
const ROOM_NAME = '{{ meeting.room_name|escapejs }}';
const JWT_TOKEN = '{{ jitsi_token|escapejs }}';
const DISPLAY_NAME = '{{ display_name|escapejs }}';
const END_URL = '{% url "jitsi:end_meeting" meeting.pk %}';
const CSRF = '{{ csrf_token }}';

function adjustLayout() {
    const nav = document.querySelector('nav.navbar');
    const wrap = document.getElementById('room-wrap');
    if (nav && wrap) wrap.style.top = nav.offsetHeight + 'px';
}

let api = null;

function initJitsi() {
    api = new JitsiMeetExternalAPI(JITSI_DOMAIN, {
        roomName: ROOM_NAME,
        jwt: JWT_TOKEN,
        width: '100%',
        height: '100%',
        parentNode: document.getElementById('jitsi-container'),
        userInfo: { displayName: DISPLAY_NAME },
        configOverwrite: {
            disableDeepLinking: true,
            startWithAudioMuted: false,
            startWithVideoMuted: false,
        },
        interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false,
            SHOW_BRAND_WATERMARK: false,
            TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'fullscreen', 'hangup', 'chat', 'settings', 'participants-pane'],
        },
    });

    api.addEventListener('readyToClose', leaveAndReturn);
    api.addEventListener('videoConferenceLeft', leaveAndReturn);
}

function leaveAndReturn() {
    if (api) { try { api.dispose(); } catch(e) {} api = null; }
    window.location.href = RETURN_URL;
}

document.addEventListener('DOMContentLoaded', () => {
    adjustLayout();
    initJitsi();
});
window.addEventListener('resize', adjustLayout);
</script>
{% endblock %}
